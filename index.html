<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Liquid Pour Puzzle</title>

<style>
body {
  margin: 0;
  font-family: "Arial Rounded MT Bold", sans-serif;
  background: linear-gradient(135deg, #ffeef7, #e0f7ff);
  text-align: center;
}

h1 {
  color: #ff8fb1;
  margin-top: 20px;
}

#game {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 40px;
}

/* 瓶 */
.bottle {
  width: 70px;
  height: 220px;
  border-radius: 30px 30px 20px 20px;
  background: rgba(255,255,255,0.5);
  border: 3px solid #ffd6e7;
  display: flex;
  flex-direction: column-reverse;
  overflow: hidden;
  padding: 6px;
  cursor: pointer;
  transition: transform 0.4s;
  position: relative;
}

/* 傾き */
.bottle.tilt-left {
  transform: rotate(-30deg);
}
.bottle.tilt-right {
  transform: rotate(30deg);
}

.bottle::before {
  content: "";
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  width: 30px;
  height: 20px;
  background: #ffd6e7;
  border-radius: 10px;
}

/* 液体 */
.liquid {
  width: 100%;
  height: 25%;
  border-radius: 10px;
  opacity: 0.9;
  transition: transform 0.4s, opacity 0.3s;
}

/* 注ぐ動き */
.pour {
  transform: translateX(40px);
  opacity: 0.6;
}

/* 消える */
.fade-out {
  animation: fadeOut 0.5s forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scaleY(0);
  }
}

button {
  margin-top: 25px;
  padding: 12px 25px;
  background: #ffd6e7;
  border: none;
  border-radius: 30px;
  cursor: pointer;
}

</style>
</head>

<body>

<h1>🫙 Liquid Pour Puzzle</h1>
<p>注いでそろえよう✨</p>

<div id="game"></div>
<button onclick="init()">🔄 リセット</button>

<script>
const COLORS = [
  "#ffadad",
  "#a0c4ff",
  "#caffbf",
  "#ffd6a5",
  "#bdb2ff"
];

const SIZE = 4;

let bottles = [];
let selected = null;

function init() {
  let liquids = [];

  COLORS.forEach(c => {
    for (let i = 0; i < SIZE; i++) liquids.push(c);
  });

  liquids.sort(() => Math.random() - 0.5);

  bottles = [];
  for (let i = 0; i < COLORS.length + 2; i++) {
    bottles.push([]);
  }

  let index = 0;
  for (let i = 0; i < COLORS.length; i++) {
    for (let j = 0; j < SIZE; j++) {
      bottles[i].push(liquids[index++]);
    }
  }

  render();
}

function render() {
  const game = document.getElementById("game");
  game.innerHTML = "";

  bottles.forEach((bottle, i) => {
    const div = document.createElement("div");
    div.className = "bottle";
    div.id = "bottle-" + i;

    div.onclick = () => clickBottle(i);

    bottle.forEach(color => {
      const liq = document.createElement("div");
      liq.className = "liquid";
      liq.style.background = color;
      div.appendChild(liq);
    });

    game.appendChild(div);
  });
}

function clickBottle(i) {
  if (selected === null) {
    if (bottles[i].length === 0) return;
    selected = i;
  } else {
    animatePour(selected, i);
    selected = null;
  }
}

function animatePour(from, to) {
  if (from === to) return;

  let source = bottles[from];
  let target = bottles[to];

  if (source.length === 0 || target.length >= SIZE) return;

  let color = source[source.length - 1];

  if (!(target.length === 0 || target[target.length - 1] === color)) return;

  const fromEl = document.getElementById("bottle-" + from);
  const toEl = document.getElementById("bottle-" + to);

  // 傾ける
  if (from < to) {
    fromEl.classList.add("tilt-right");
  } else {
    fromEl.classList.add("tilt-left");
  }

  // 液体取得
  const liquidEl = fromEl.lastChild;

  if (liquidEl) {
    liquidEl.classList.add("pour");
  }

  setTimeout(() => {
    target.push(source.pop());
    render();

    setTimeout(() => {
      checkClear();
    }, 100);

  }, 400);
}

function checkClear() {
  bottles.forEach(bottle => {
    if (bottle.length === SIZE && bottle.every(c => c === bottle[0])) {
      bottle.length = 0;
    }
  });

  render();

  let cleared = bottles.every(b => b.length === 0);

  if (cleared) {
    setTimeout(() => {
      alert("🎉 完全クリア！");
      init();
    }, 200);
  }
}

init();
</script>

</body>
</html>
