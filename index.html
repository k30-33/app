<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Flask Liquid Puzzle</title>

<style>
body {
  margin: 0;
  font-family: "Arial Rounded MT Bold", sans-serif;
  background: linear-gradient(135deg, #ffeef7, #e0f7ff);
  text-align: center;
}

h1 {
  color: #ff8fb1;
}

#game {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin-top: 40px;
}

/* フラスコ */
.flask {
  width: 60px;
  height: 240px;
  background: rgba(255,255,255,0.5);
  border: 3px solid #ffd6e7;
  border-radius: 25px 25px 15px 15px;
  display: flex;
  flex-direction: column-reverse;
  padding: 5px;
  position: relative;
  overflow: hidden;
  transition: transform 0.4s;
}

/* 首 */
.flask::before {
  content: "";
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 25px;
  background: #ffd6e7;
  border-radius: 10px;
}

/* 傾き */
.tilt-left { transform: rotate(-25deg); }
.tilt-right { transform: rotate(25deg); }

/* 液体 */
.liquid {
  width: 100%;
  height: 25%;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
}

/* 波 */
.liquid::after {
  content: "";
  position: absolute;
  width: 200%;
  height: 100%;
  top: 0;
  left: -50%;
  background: rgba(255,255,255,0.3);
  animation: wave 2s infinite linear;
}

@keyframes wave {
  0% { transform: translateX(0); }
  100% { transform: translateX(50%); }
}

/* 泡 */
.bubble {
  position: absolute;
  bottom: 0;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  animation: bubble 2s infinite;
}

@keyframes bubble {
  0% { transform: translateY(0); opacity: 0.7; }
  100% { transform: translateY(-60px); opacity: 0; }
}

/* ボタン */
button {
  margin-top: 25px;
  padding: 12px 25px;
  background: #ffd6e7;
  border: none;
  border-radius: 30px;
  cursor: pointer;
}

</style>
</head>

<body>

<h1>🧪 Flask Puzzle</h1>
<p>同じ色は一気に注げるよ✨</p>

<div id="game"></div>
<button onclick="init()">🔄 リセット</button>

<script>
const COLORS = [
  "#ffadad",
  "#a0c4ff",
  "#caffbf",
  "#ffd6a5",
  "#bdb2ff"
];

const SIZE = 4;

let flasks = [];
let selected = null;

function init() {
  let liquids = [];

  COLORS.forEach(c => {
    for (let i = 0; i < SIZE; i++) liquids.push(c);
  });

  liquids.sort(() => Math.random() - 0.5);

  flasks = [];
  for (let i = 0; i < COLORS.length + 2; i++) {
    flasks.push([]);
  }

  let index = 0;
  for (let i = 0; i < COLORS.length; i++) {
    for (let j = 0; j < SIZE; j++) {
      flasks[i].push(liquids[index++]);
    }
  }

  render();
}

function render() {
  const game = document.getElementById("game");
  game.innerHTML = "";

  flasks.forEach((flask, i) => {
    const div = document.createElement("div");
    div.className = "flask";
    div.id = "flask-" + i;

    div.onclick = () => clickFlask(i);

    flask.forEach(color => {
      const liq = document.createElement("div");
      liq.className = "liquid";
      liq.style.background = color;

      // 泡追加
      for (let b = 0; b < 2; b++) {
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.style.left = Math.random() * 80 + "%";
        bubble.style.animationDelay = Math.random() + "s";
        liq.appendChild(bubble);
      }

      div.appendChild(liq);
    });

    game.appendChild(div);
  });
}

function clickFlask(i) {
  if (selected === null) {
    if (flasks[i].length === 0) return;
    selected = i;
  } else {
    pour(selected, i);
    selected = null;
  }
}

function pour(from, to) {
  if (from === to) return;

  let a = flasks[from];
  let b = flasks[to];

  if (a.length === 0 || b.length >= SIZE) return;

  let color = a[a.length - 1];

  if (!(b.length === 0 || b[b.length - 1] === color)) return;

  const fromEl = document.getElementById("flask-" + from);

  // 傾ける
  fromEl.classList.add(from < to ? "tilt-right" : "tilt-left");

  // 同じ色をまとめて移動
  let count = 0;
  for (let i = a.length - 1; i >= 0; i--) {
    if (a[i] === color) count++;
    else break;
  }

  let space = SIZE - b.length;
  let moveCount = Math.min(count, space);

  setTimeout(() => {
    for (let i = 0; i < moveCount; i++) {
      b.push(a.pop());
    }

    render();
    checkClear();
  }, 400);
}

function checkClear() {
  flasks.forEach(f => {
    if (f.length === SIZE && f.every(c => c === f[0])) {
      f.length = 0;
    }
  });

  render();

  let clear = flasks.every(f => f.length === 0);

  if (clear) {
    setTimeout(() => {
      alert("🎉 完全クリア！");
      init();
    }, 200);
  }
}

init();
</script>

</body>
</html>
